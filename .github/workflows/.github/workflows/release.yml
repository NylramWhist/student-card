name: Release Foundry module

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        shell: bash
        run: |
          version="$(jq -r '.version' module.json)"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match module version v${version}."
            exit 1
          fi

      - name: Build Foundry package
        shell: bash
        run: |
          mkdir -p dist/package
          cp module.json LICENSE README.md dist/package/
          cp -R lang scripts styles dist/package/
          cd dist/package
          zip -r ../student-card.zip .
          cd ..
          cp package/module.json module.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/student-card.zip \
              dist/module.json \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/student-card.zip \
              dist/module.json \
              --title "Student Card ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
